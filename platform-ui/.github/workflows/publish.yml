name: Publish platform-ui to npm

on:
  push:
    tags:
      - 'v*'   # trigger on v1.0.0, v1.2.3, etc.

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Build library (partial Ivy compilation)
        run: npm run build

      - name: Publish to npm
        run: npm publish dist/platform-ui --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
